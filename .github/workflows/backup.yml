name: Excel Backup + Evaluate (no-auth, IST 8AM-10PM)

on:
  schedule:
    - cron: "0,30 2-16 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force run (ignore active window)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests pandas openpyxl
      - name: Check active window (IST 8AM-10PM)
        id: win
        run: |
          H=$(TZ=Asia/Kolkata date +%H)
          if [ "${{ github.event.inputs.force }}" = "true" ] || ([ $H -ge 8 ] && [ $H -lt 22 ]); then
            echo "go=yes" >> $GITHUB_OUTPUT
          else
            echo "go=no"  >> $GITHUB_OUTPUT
          fi
      - name: Backup
        if: steps.win.outputs.go == 'yes'
        env:
          SOURCE_URL: ${{ secrets.SOURCE_URL }}
        run: python backup.py
      - name: Evaluate
        if: steps.win.outputs.go == 'yes'
        run: python evaluate.py
      - name: Commit
        if: steps.win.outputs.go == 'yes'
        run: |
          git config user.name  "backup-bot"
          git config user.email "bot@users.noreply.github.com"
          git add backups docs
          git diff --cached --quiet || git commit -m "backup+eval: $(TZ=Asia/Kolkata date '+%F %H:%M IST')"
          git push
