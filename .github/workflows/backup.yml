name: Excel Backup (no-auth, IST 8AM-10PM)

on:
  schedule:
    - cron: "30 2 * * *"
    - cron: "0,30 3-16 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force run (ignore active window)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backup
        env:
          SOURCE_URL: ${{ secrets.SOURCE_URL }}
          ACTIVE_WINDOW_START: "2026-04-23"
          ACTIVE_WINDOW_END: "2026-04-26"
          ACTIVE_HOUR_START_IST: "8"
          ACTIVE_HOUR_END_IST: "22"
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '0' }}
        run: python backup.py

      - name: Commit backup to repo
        run: |
          if [ -d backups ] && [ "$(ls -A backups 2>/dev/null)" ]; then
            git config user.name "backup-bot"
            git config user.email "backup-bot@users.noreply.github.com"
            git add backups/
            git diff --cached --quiet || git commit -m "backup: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No backup files produced (outside window). Nothing to commit."
          fi
